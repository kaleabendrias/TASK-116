services:
  tests:
    image: node:20-bookworm-slim
    working_dir: /app
    environment:
      CI: "true"
      NPM_CONFIG_UPDATE_NOTIFIER: "false"
      NPM_CONFIG_FUND: "false"
      NODE_OPTIONS: "--unhandled-rejections=strict"
    volumes:
      - ./:/app
      - test_node_modules:/app/node_modules
    command: >
      sh -lc "
      set -eu;
      echo '[tests] installing dependencies';
      npm ci --no-audit --no-fund || npm install --no-audit --no-fund;
      echo '[tests] running unit suite';
      npm run test:unit;
      echo '[tests] running API suite';
      npm run test:api;
      "

volumes:
  test_node_modules:
