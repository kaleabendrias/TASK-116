services:
  tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    working_dir: /app
    environment:
      CI: "true"
      NPM_CONFIG_UPDATE_NOTIFIER: "false"
      NPM_CONFIG_FUND: "false"
      NODE_OPTIONS: "--unhandled-rejections=strict"
    volumes:
      - ./:/app
      - test_node_modules:/app/node_modules
    command: >
      sh -lc "
      set -eu;
      echo '[tests] running unit suite';
      npm run test:unit;
      echo '[tests] running API suite';
      npm run test:api;
      echo '[tests] running HTTP suite';
      npm run test:http;
      echo '[tests] running frontend suite';
      npm run test:frontend;
      "

volumes:
  test_node_modules:
